<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Twitter Open Tracker</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <p class="eyebrow">Twitter Open Tracker</p>
      <section class="hero">
        <div>
          <p class="metric-label">Today</p>
          <h1 id="todayCount">0</h1>
          <p class="label">Resets automatically when the local day changes</p>
        </div>
        <button id="resetTodayButton" type="button">Reset today</button>
      </section>

      <section class="chart-card" aria-labelledby="historyTitle">
        <div class="chart-header">
          <div>
            <p class="metric-label">History</p>
            <h2 id="historyTitle">Last 14 days</h2>
          </div>
          <button id="clearHistoryButton" class="secondary-button" type="button">Clear history</button>
        </div>
        <svg id="historyChart" viewBox="0 0 320 180" role="img" aria-label="Line chart of daily Twitter opens"></svg>
        <div class="chart-labels">
          <span id="startLabel"></span>
          <span id="endLabel"></span>
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
  </html>
